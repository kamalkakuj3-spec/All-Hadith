<!DOCTYPE html>
<html>
<head>
    <title>ইমেজ ম্যানেজ - অ্যাডমিন প্যানেল</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #333; text-align: center; }
        .image-card { background: white; border-radius: 10px; margin-bottom: 20px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 15px; flex-wrap: wrap; }
        .image-card img { width: 150px; height: 150px; object-fit: cover; border-radius: 8px; }
        .image-info { flex: 1; }
        .image-info h3 { margin: 0 0 10px 0; color: #333; }
        .image-info p { color: #666; margin: 5px 0; }
        .image-info small { color: #999; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background: #c82333; }
        .edit-btn { background: #ffc107; color: #333; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .edit-btn:hover { background: #e0a800; }
        .nav { text-align: center; margin-top: 20px; }
        .nav a { color: #007bff; text-decoration: none; margin: 0 10px; }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 ইমেজ ম্যানেজ করুন</h1>
        
        <div id="imagesList" class="loading">লোড হচ্ছে...</div>
        
        <div class="nav">
            <a href="index.html">📋 ড্যাশবোর্ড</a>
            <a href="add-image.html">➕ নতুন ইমেজ</a>
            <a href="../user/index.html">👁️ ইউজার ভিউ</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        function loadImages() {
            const container = document.getElementById('imagesList');
            container.innerHTML = 'লোড হচ্ছে...';
            
            database.ref('images').on('value', (snapshot) => {
                const images = snapshot.val();
                if (!images) {
                    container.innerHTML = '<p style="text-align:center;">📭 কোনো ইমেজ পাওয়া যায়নি। <a href="add-image.html">নতুন ইমেজ যোগ করুন</a></p>';
                    return;
                }
                
                let html = '';
                Object.keys(images).forEach(key => {
                    const img = images[key];
                    html += `
                        <div class="image-card" id="card-${key}">
                            <img src="${img.imageUrl}" alt="${img.title}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                            <div class="image-info">
                                <h3>📌 ${img.title}</h3>
                                <p>📝 ${img.description || 'বর্ণনা নেই'}</p>
                                <small>🆔 ${img.id}</small><br>
                                <small>📅 ${new Date(img.createdAt).toLocaleString() || 'তারিখ নেই'}</small>
                                <div style="margin-top: 10px;">
                                    <button class="edit-btn" onclick="editImage('${key}')">✏️ এডিট</button>
                                    <button class="delete-btn" onclick="deleteImage('${key}')">🗑️ ডিলিট</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }
        
        function editImage(key) {
            const newTitle = prompt('নতুন টাইটেল দিন:');
            if (newTitle) {
                database.ref('images/' + key).update({ title: newTitle });
                alert('✅ টাইটেল আপডেট হয়েছে!');
            }
        }
        
        function deleteImage(key) {
            if (confirm('আপনি কি এই ইমেজ ডিলিট করতে চান?')) {
                database.ref('images/' + key).remove().then(() => {
                    alert('✅ ইমেজ ডিলিট হয়েছে!');
                }).catch(error => {
                    alert('❌ এরর: ' + error.message);
                });
            }
        }
        
        loadImages();
    </script>
</body>
</html>
