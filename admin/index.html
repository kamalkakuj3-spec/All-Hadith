<!DOCTYPE html>
<html>
<head>
    <title>অ্যাডমিন ড্যাশবোর্ড</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { color: #333; }
        .card { background: white; border-radius: 10px; padding: 20px; margin: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { margin: 0 0 10px 0; }
        .card p { color: #666; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        .btn-green { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .stats { font-size: 36px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ অ্যাডমিন ড্যাশবোর্ড</h1>
        <div class="card">
            <h2>📸 মোট ইমেজ</h2>
            <p class="stats" id="totalImages">0</p>
        </div>
        <div class="card">
            <h2>➕ ইমেজ যোগ করুন</h2>
            <p>ImgBB থেকে ইমেজ আপলোড করে লিংক দিন</p>
            <a href="add-image.html" class="btn btn-green">➕ ইমেজ যোগ করুন</a>
        </div>
        <div class="card">
            <h2>✏️ ইমেজ ম্যানেজ করুন</h2>
            <p>ইমেজ এডিট ও ডিলিট করুন</p>
            <a href="manage-images.html" class="btn">✏️ ম্যানেজ করুন</a>
        </div>
        <div class="card">
            <h2>👁️ ইউজার পেজ দেখুন</h2>
            <p>স্লাইডার দেখতে ক্লিক করুন</p>
            <a href="../user/index.html" class="btn btn-green">👁️ ইউজার ভিউ</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        database.ref('images').on('value', (snapshot) => {
            const images = snapshot.val();
            const count = images ? Object.keys(images).length : 0;
            document.getElementById('totalImages').innerText = count;
        });
    </script>
</body>
</html>
