<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AGLS - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d7d46;
            --primary-dark: #1e5a32;
            --bg-primary: #f5f3f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #888888;
            --border-color: #e0ddd8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s ease;
            --nav-height: 64px;
            --header-height: 56px;
        }
        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #2a2a2a;
            --text-primary: #e8e6e3;
            --text-secondary: #b0b0b0;
            --text-muted: #777777;
            --border-color: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            padding-bottom: 80px;
        }
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-secondary);
            padding: 8px 16px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .header-left h1 { font-size: 1.3rem; color: var(--primary); font-weight: 700; cursor: pointer; }
        .header-right { display: flex; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px;
            border: none; border-radius: 50%;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--border-color); }
        .icon-btn:active { transform: scale(0.92); }
        .main-content {
            max-width: 480px; margin: 0 auto;
            padding: 16px; padding-bottom: calc(var(--nav-height) + 20px);
        }
        .admin-stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 16px;
        }
        .admin-stat-card {
            background: var(--bg-card); padding: 12px;
            border-radius: var(--radius-sm); text-align: center;
            border: 1px solid var(--border-color);
        }
        .admin-stat-card .number { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .admin-stat-card .label { font-size: 0.65rem; color: var(--text-muted); }
        .admin-tabs {
            display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .admin-tab {
            padding: 6px 14px; background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.8rem; color: var(--text-secondary);
            transition: all var(--transition);
        }
        .admin-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .admin-user-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-bottom: 1px solid var(--border-color);
        }
        .admin-user-item .avatar {
            width: 32px; height: 32px;
            border-radius: 50%; object-fit: cover;
        }
        .admin-user-item .info { flex: 1; }
        .admin-user-item .info .name { font-weight: 600; font-size: 0.85rem; }
        .admin-user-item .info .email { font-size: 0.7rem; color: var(--text-muted); }
        .admin-user-item .actions { display: flex; gap: 4px; }
        .admin-post-item {
            padding: 12px; border-bottom: 1px solid var(--border-color);
        }
        .admin-post-item .content { font-size: 0.9rem; color: var(--text-secondary); }
        .admin-post-item .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .admin-post-item .actions { margin-top: 8px; }
        .btn-primary {
            padding: 8px 18px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm);
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
            white-space: nowrap; transition: all var(--transition);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary {
            padding: 6px 14px; background: transparent;
            color: var(--text-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
        }
        .btn-danger {
            padding: 6px 14px; background: #e74c3c; color: white;
            border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
        }
        .btn-success {
            padding: 6px 14px; background: #27ae60; color: white;
            border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
        }
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); color: var(--text-primary);
            padding: 10px 20px; border-radius: var(--radius-sm);
            box-shadow: var(--shadow); border: 1px solid var(--border-color);
            z-index: 999; max-width: 90%; text-align: center;
            font-size: 0.85rem; animation: slideUp 0.3s ease;
        }
        .toast.hidden { display: none; }
        .empty-state {
            text-align: center; padding: 30px 20px; color: var(--text-muted);
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.5; }
        .empty-state h3 { color: var(--text-secondary); font-size: 1rem; }
        .hidden { display: none !important; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100; backdrop-filter: blur(10px);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            background: none; border: none;
            color: var(--text-muted); font-size: 0.6rem;
            padding: 4px 0; cursor: pointer; transition: all var(--transition);
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--primary); }
        .badge {
            position: absolute; top: 2px; right: 50%;
            transform: translateX(calc(50% + 12px));
            background: #e74c3c; color: white; font-size: 0.5rem;
            padding: 1px 6px; border-radius: 10px; min-width: 16px;
            text-align: center; font-weight: 600;
        }
        .badge.hidden { display: none; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left"><h1 onclick="window.location.href='index.html'">AGLS</h1></div>
        <div class="header-right">
            <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main class="main-content" id="mainContent">
        <div class="admin-panel">
            <h2 style="margin-bottom:12px;">Admin Panel</h2>

            <div class="admin-stats" id="adminStats">
                <div class="admin-stat-card"><span class="number" id="statUsers">0</span><span class="label">Users</span></div>
                <div class="admin-stat-card"><span class="number" id="statPosts">0</span><span class="label">Posts</span></div>
                <div class="admin-stat-card"><span class="number" id="statComments">0</span><span class="label">Comments</span></div>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" data-admin="users">Users</button>
                <button class="admin-tab" data-admin="posts">Posts</button>
                <button class="admin-tab" data-admin="reports">Reports</button>
            </div>

            <div id="adminContent"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-compass"></i><span>Explore</span></button>
        <button class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-search"></i><span>Search</span></button>
        <button class="nav-item" onclick="window.location.href='index.html'">
            <i class="fas fa-bell"></i><span>Alerts</span>
        </button>
        <button class="nav-item active"><i class="fas fa-user-shield"></i><span>Admin</span></button>
    </nav>

    <div id="toast" class="toast hidden"></div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>

    <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getDatabase, ref, get, update, remove } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyDaSwj73DW4EpA2XIkL2cMTF_fBzDzPjg4",
        authDomain: "all-hadith-a68fa.firebaseapp.com",
        databaseURL: "https://all-hadith-a68fa-default-rtdb.firebaseio.com",
        projectId: "all-hadith-a68fa",
        storageBucket: "all-hadith-a68fa.firebasestorage.app",
        messagingSenderId: "124928027736",
        appId: "1:124928027736:web:7f0e8e0a771f244eca2e2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let isAdmin = false;
    const toast = document.getElementById('toast');
    const adminContent = document.getElementById('adminContent');

    function showToast(msg, duration = 3000) {
        toast.textContent = msg;
        toast.classList.remove('hidden');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.add('hidden'), duration);
    }

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function getAvatar(name, photo) { return photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2d7d46&color=fff&size=100`; }

    // ===== ADMIN FUNCTIONS =====
    async function loadAdminStats() {
        try {
            const users = await get(ref(db, 'users'));
            const posts = await get(ref(db, 'posts'));
            const comments = await get(ref(db, 'comments'));
            document.getElementById('statUsers').textContent = users.exists() ? users.size : 0;
            document.getElementById('statPosts').textContent = posts.exists() ? posts.size : 0;
            let c = 0; if (comments.exists()) comments.forEach(()=>c++);
            document.getElementById('statComments').textContent = c;
        } catch(e) { console.error(e); }
    }

    async function loadAdminUsers() {
        adminContent.innerHTML = '<div class="text-center text-muted">Loading...</div>';
        try {
            const snap = await get(ref(db, 'users'));
            if (!snap.exists()) { adminContent.innerHTML = '<div class="empty-state"><h3>No users</h3></div>'; return; }
            const users = []; snap.forEach(c => { const u = c.val(); u.id = c.key; users.push(u); });
            adminContent.innerHTML = users.map(u => `
                <div class="admin-user-item">
                    <img class="avatar" src="${getAvatar(u.name, u.photoURL)}">
                    <div class="info"><div class="name">${escapeHtml(u.name)}</div><div class="email">${escapeHtml(u.email||'')}</div></div>
                    <div class="actions">
                        ${u.isAdmin ? `<button class="btn-secondary" onclick="window.toggleAdmin('${u.id}',false)" style="font-size:0.65rem;padding:2px 8px;">Remove Admin</button>` :
                        `<button class="btn-success" onclick="window.toggleAdmin('${u.id}',true)" style="font-size:0.65rem;padding:2px 8px;">Make Admin</button>`}
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); adminContent.innerHTML = '<p>Error loading users</p>'; }
    }

    async function loadAdminPosts() {
        adminContent.innerHTML = '<div class="text-center text-muted">Loading...</div>';
        try {
            const snap = await get(ref(db, 'posts'));
            if (!snap.exists()) { adminContent.innerHTML = '<div class="empty-state"><h3>No posts</h3></div>'; return; }
            const posts = []; snap.forEach(c => { const p = c.val(); p.id = c.key; posts.push(p); });
            posts.sort((a,b) => new Date(b.date) - new Date(a.date));
            adminContent.innerHTML = posts.slice(0,30).map(p => `
                <div class="admin-post-item">
                    <div class="content">${escapeHtml(p.content.substring(0,150))}${p.content.length > 150 ? '...' : ''}</div>
                    <div class="meta">By ${escapeHtml(p.authorName)} | ${new Date(p.date).toLocaleDateString()} | Likes: ${p.likes||0} | Comments: ${p.comments||0}</div>
                    <div class="actions"><button class="btn-danger" onclick="window.adminDeletePost('${p.id}')" style="font-size:0.7rem;padding:2px 10px;">Delete</button></div>
                </div>
            `).join('');
        } catch(e) { console.error(e); adminContent.innerHTML = '<p>Error loading posts</p>'; }
    }

    async function loadAdminReports() {
        adminContent.innerHTML = `<div class="empty-state"><i class="fas fa-flag"></i><h3>No reports yet</h3></div>`;
    }

    // ===== GLOBAL ADMIN FUNCTIONS =====
    window.toggleAdmin = async function(userId, makeAdmin) {
        try {
            await update(ref(db, `users/${userId}`), { isAdmin: makeAdmin });
            showToast(`User ${makeAdmin ? 'promoted to' : 'removed from'} admin`);
            await loadAdminUsers();
        } catch(e) { console.error(e); showToast('Failed to update user'); }
    };

    window.adminDeletePost = async function(postId) {
        if (confirm('Delete this post?')) {
            try {
                await remove(ref(db, `posts/${postId}`));
                await remove(ref(db, `comments/${postId}`));
                await remove(ref(db, `likes/${postId}`));
                showToast('Post deleted');
                await loadAdminPosts();
                await loadAdminStats();
            } catch(e) { console.error(e); showToast('Failed to delete'); }
        }
    };

    // ===== THEME =====
    function toggleTheme() {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        const icon = document.querySelector('#themeToggle i');
        if (icon) icon.className = dark ? 'fas fa-moon' : 'fas fa-sun';
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeIcon = document.querySelector('#themeToggle i');
    if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const snap = await get(ref(db, `users/${user.uid}`));
            if (snap.exists()) {
                isAdmin = snap.val().isAdmin || false;
                if (!isAdmin) {
                    showToast('Access denied. Admin only.');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }
            }

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                if (confirm('Logout?')) { signOut(auth); }
            });

            // Setup admin
            await loadAdminStats();
            await loadAdminUsers();

            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.addEventListener('click', async () => {
                    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
                    tab.classList.add('active');
                    const name = tab.dataset.admin;
                    if (name === 'users') await loadAdminUsers();
                    else if (name === 'posts') await loadAdminPosts();
                    else if (name === 'reports') await loadAdminReports();
                });
            });

        } else {
            window.location.href = 'login.html';
        }
    });

    console.log('🔥 AGLS Admin Loaded');
    </script>
</body>
</html>
