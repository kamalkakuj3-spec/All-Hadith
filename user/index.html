<!DOCTYPE html>
<html>
<head>
    <title>ইমেজ স্লাইডার - বাংলাদেশ পাইকারি দোকান</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        .slider-container { position: relative; width: 100%; max-width: 1000px; margin: 50px auto; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slider { display: flex; transition: transform 0.5s ease-in-out; }
        .slide { min-width: 100%; position: relative; }
        .slide img { width: 100%; height: 500px; object-fit: cover; }
        .caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; padding: 15px; text-align: center; }
        .caption h3 { margin-bottom: 5px; }
        .prev, .next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 15px 20px; cursor: pointer; font-size: 20px; border-radius: 5px; transition: 0.3s; }
        .prev:hover, .next:hover { background: rgba(0,0,0,0.8); }
        .prev { left: 10px; }
        .next { right: 10px; }
        .dots { text-align: center; margin-top: 15px; }
        .dot { display: inline-block; width: 12px; height: 12px; background: #bbb; border-radius: 50%; margin: 0 5px; cursor: pointer; transition: 0.3s; }
        .dot.active { background: #007bff; transform: scale(1.2); }
        .no-images { text-align: center; color: white; padding: 100px; font-size: 20px; }
        .loading { text-align: center; color: white; padding: 100px; font-size: 24px; }
        .admin-link { position: fixed; bottom: 20px; right: 20px; background: #007bff; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-size: 14px; }
        @media (max-width: 768px) { .slide img { height: 300px; } .caption { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="slider-container" id="sliderContainer" style="display: none;">
        <button class="prev" id="prevBtn">❮</button>
        <div class="slider" id="slider"></div>
        <button class="next" id="nextBtn">❯</button>
        <div class="dots" id="dots"></div>
    </div>
    <div id="noImages" class="no-images" style="display: none;">📭 কোনো ইমেজ নেই</div>
    <div id="loading" class="loading">⏳ লোড হচ্ছে...</div>
    <a href="../admin/index.html" class="admin-link">🔐 অ্যাডমিন প্যানেল</a>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../firebase-config.js"></script>
    
    <script>
        let images = [];
        let currentIndex = 0;
        let autoSlideInterval;
        
        function loadImages() {
            database.ref('images').on('value', (snapshot) => {
                const data = snapshot.val();
                images = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        images.push(data[key]);
                    });
                }
                
                document.getElementById('loading').style.display = 'none';
                
                if (images.length === 0) {
                    document.getElementById('noImages').style.display = 'block';
                    document.getElementById('sliderContainer').style.display = 'none';
                    return;
                }
                
                document.getElementById('noImages').style.display = 'none';
                document.getElementById('sliderContainer').style.display = 'block';
                renderSlider();
                startAutoSlide();
            });
        }
        
        function renderSlider() {
            const slider = document.getElementById('slider');
            const dots = document.getElementById('dots');
            
            slider.innerHTML = '';
            dots.innerHTML = '';
            
            images.forEach((img, i) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.innerHTML = `
                    <img src="${img.imageUrl}" alt="${img.title}" onerror="this.src='https://via.placeholder.com/800x500?text=Image+Not+Found'">
                    <div class="caption">
                        <h3>${img.title}</h3>
                        <p>${img.description || ''}</p>
                    </div>
                `;
                slider.appendChild(slide);
                
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.onclick = () => goToSlide(i);
                dots.appendChild(dot);
            });
            
            updateSlider();
        }
        
        function updateSlider() {
            const slider = document.getElementById('slider');
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        }
        
        function goToSlide(index) {
            currentIndex = index;
            updateSlider();
            resetAutoSlide();
        }
        
        function nextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            updateSlider();
            resetAutoSlide();
        }
        
        function prevSlide() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateSlider();
            resetAutoSlide();
        }
        
        function startAutoSlide() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                nextSlide();
            }, 4000);
        }
        
        function resetAutoSlide() {
            clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                nextSlide();
            }, 4000);
        }
        
        document.getElementById('prevBtn').onclick = prevSlide;
        document.getElementById('nextBtn').onclick = nextSlide;
        
        loadImages();
    </script>
</body>
</html>
