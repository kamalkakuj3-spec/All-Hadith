<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AGLS - Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f3f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #e0ddd8;
            border-top-color: #2d7d46;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo {
            font-size: 2rem;
            color: #2d7d46;
            font-weight: 700;
        }
        p {
            color: #888;
            font-size: 0.9rem;
        }
        .progress-bar {
            width: 200px;
            height: 4px;
            background: #e0ddd8;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: #2d7d46;
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="logo">AGLS</div>
    <div class="loader"></div>
    <p>Loading Arabic Grammar Life Support...</p>
    <div class="progress-bar"><div class="fill"></div></div>

    <script>
        // 2 সেকেন্ড পর login.html-এ যান
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);
    </script>
</body>
</html>
