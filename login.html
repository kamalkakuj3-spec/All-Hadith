<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AGLS - লগইন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 72px; height: 72px;
            background: #2d7d46;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: white;
            font-weight: 700;
        }
        h1 { color: #2d7d46; font-size: 26px; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 15px; }
        .tagline { color: #999; font-size: 13px; margin-bottom: 24px; }
        .google-btn {
            width: 100%;
            padding: 16px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 56px;
            transition: all 0.2s;
        }
        .google-btn:active { transform: scale(0.97); }
        .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        .features { text-align: left; margin: 16px 0; }
        .features p {
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .features i { color: #2d7d46; width: 18px; }
        #status {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        #status.success { display: block; background: #e8f5e9; color: #2e7d32; }
        #status.error { display: block; background: #ffebee; color: #c62828; }
        #status.loading { display: block; background: #e3f2fd; color: #0d47a1; }
        .footer { color: #999; font-size: 12px; margin-top: 16px; }
        .footer .highlight { color: #2d7d46; font-weight: 600; }
        .spinner {
            display: none;
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .google-btn.loading .spinner { display: inline-block; }
        .google-btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">AG</div>
        <h1>AGLS</h1>
        <p class="subtitle">আরবি ব্যাকরণ সহায়তা</p>
        <p class="tagline">শিখুন • শেয়ার করুন • সংযুক্ত হোন</p>

        <button id="googleSignInBtn" class="google-btn">
            <span class="btn-text"><i class="fab fa-google"></i> গুগল দিয়ে সাইন ইন করুন</span>
            <span class="spinner"></span>
        </button>

        <div id="status"></div>

        <div class="divider">অথবা</div>

        <div class="features">
            <p><i class="fas fa-check-circle"></i> আরবি শিক্ষার্থীদের কমিউনিটিতে যোগ দিন</p>
            <p><i class="fas fa-check-circle"></i> জ্ঞান শেয়ার করুন এবং প্রশ্ন করুন</p>
            <p><i class="fas fa-check-circle"></i> সহশিক্ষার্থীদের সাথে সংযুক্ত হোন</p>
        </div>

        <div class="footer">
            চালিয়ে যাওয়ার মাধ্যমে, আপনি আমাদের <span class="highlight">শর্তাবলী</span> এবং <span class="highlight">গোপনীয়তা নীতি</span> মেনে নিচ্ছেন
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>

    <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'firebase/auth';
    import { getDatabase, ref, set, get, update } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyDaSwj73DW4EpA2XIkL2cMTF_fBzDzPjg4",
        authDomain: "all-hadith-a68fa.firebaseapp.com",
        databaseURL: "https://all-hadith-a68fa-default-rtdb.firebaseio.com",
        projectId: "all-hadith-a68fa",
        storageBucket: "all-hadith-a68fa.firebasestorage.app",
        messagingSenderId: "124928027736",
        appId: "1:124928027736:web:7f0e8e0a771f244eca2e2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const signInBtn = document.getElementById('googleSignInBtn');
    const statusDiv = document.getElementById('status');

    function setStatus(msg, type = 'loading') {
        statusDiv.textContent = msg;
        statusDiv.className = type;
    }

    async function saveUserToDatabase(user) {
        const userRef = ref(db, `users/${user.uid}`);
        const snapshot = await get(userRef);
        if (!snapshot.exists()) {
            await set(userRef, {
                uid: user.uid,
                name: user.displayName || 'ব্যবহারকারী',
                email: user.email,
                photoURL: user.photoURL || '',
                bio: '',
                joinDate: new Date().toISOString(),
                followers: 0,
                following: 0,
                posts: 0,
                isAdmin: false
            });
        } else {
            await update(userRef, {
                name: user.displayName || snapshot.val().name,
                photoURL: user.photoURL || snapshot.val().photoURL,
                lastLogin: new Date().toISOString()
            });
        }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });

    signInBtn.addEventListener('click', async () => {
        signInBtn.disabled = true;
        signInBtn.classList.add('loading');
        setStatus('⏳ গুগলের সাথে সংযোগ হচ্ছে...', 'loading');

        try {
            const result = await signInWithPopup(auth, provider);
            await saveUserToDatabase(result.user);
            setStatus('✅ স্বাগতম ' + result.user.displayName + '!', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } catch (error) {
            console.error('Error:', error);
            let msg = '❌ ' + error.message;
            if (error.code === 'auth/popup-blocked') {
                msg = '❌ পপআপ ব্লক! ব্রাউজার সেটিংসে পপআপ অনুমতি দিন।';
            } else if (error.code === 'auth/unauthorized-domain') {
                msg = '❌ ডোমেইন অনুমোদিত নয়। প্রশাসকের সাথে যোগাযোগ করুন।';
            } else if (error.code === 'auth/network-request-failed') {
                msg = '❌ নেটওয়ার্ক সমস্যা! আপনার ইন্টারনেট সংযোগ চেক করুন।';
            }
            setStatus(msg, 'error');
        } finally {
            signInBtn.disabled = false;
            signInBtn.classList.remove('loading');
        }
    });
    </script>
</body>
</html>
