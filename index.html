        // ============================================
        // FOLLOW SYSTEM
        // ============================================
        async function followUser(targetUserId) {
            if (!currentUser) {
                showToast('Please login to follow');
                return;
            }
            
            if (targetUserId === currentUser.uid) {
                showToast('You cannot follow yourself');
                return;
            }
            
            try {
                const followingRef = ref(db, `following/${currentUser.uid}/${targetUserId}`);
                await set(followingRef, {
                    userId: targetUserId,
                    date: new Date().toISOString()
                });
                
                const followersRef = ref(db, `followers/${targetUserId}/${currentUser.uid}`);
                await set(followersRef, {
                    userId: currentUser.uid,
                    userName: currentUserData?.name || currentUser.displayName || 'User',
                    userPhoto: currentUserData?.photoURL || currentUser.photoURL || '',
                    date: new Date().toISOString()
                });
                
                await updateFollowCounts(currentUser.uid, 'following', 1);
                await updateFollowCounts(targetUserId, 'followers', 1);
                
                await sendNotification(targetUserId, 'follow', {
                    fromUserId: currentUser.uid,
                    fromUserName: currentUserData?.name || currentUser.displayName || 'User',
                    fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL || ''
                });
                
                showToast('Following!');
                return true;
            } catch (error) {
                console.error('Follow Error:', error);
                showToast('Failed to follow');
            }
        }

        async function unfollowUser(targetUserId) {
            if (!currentUser) return;
            
            try {
                await remove(ref(db, `following/${currentUser.uid}/${targetUserId}`));
                await remove(ref(db, `followers/${targetUserId}/${currentUser.uid}`));
                
                await updateFollowCounts(currentUser.uid, 'following', -1);
                await updateFollowCounts(targetUserId, 'followers', -1);
                
                showToast('Unfollowed');
                return true;
            } catch (error) {
                console.error('Unfollow Error:', error);
                showToast('Failed to unfollow');
            }
        }

        async function updateFollowCounts(userId, field, change) {
            try {
                const userRef = ref(db, `users/${userId}`);
                const userSnap = await get(userRef);
                if (userSnap.exists()) {
                    const current = userSnap.val()[field] || 0;
                    await update(userRef, { [field]: Math.max(0, current + change) });
                }
            } catch (error) {
                console.error('Update Follow Counts Error:', error);
            }
        }

        async function checkFollowing(targetUserId) {
            if (!currentUser) return false;
            
            try {
                const followingRef = ref(db, `following/${currentUser.uid}/${targetUserId}`);
                const snapshot = await get(followingRef);
                return snapshot.exists();
            } catch (error) {
                return false;
            }
        }

        // ============================================
        // SEARCH
        // ============================================
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchTabs = document.querySelectorAll('.search-tab');
            let currentTab = 'users';
            
            const performSearch = () => {
                const query = searchInput.value.trim();
                if (query.length >= 2) {
                    if (currentTab === 'users') {
                        searchUsers(query);
                    } else {
                        searchPosts(query);
                    }
                } else {
                    document.getElementById('searchResults').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-search"></i>
                            <h3>Type at least 2 characters</h3>
                            <p>Search for users or posts</p>
                        </div>
                    `;
                }
            };
            
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
            
            searchTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    searchTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.search;
                    if (searchInput.value.trim().length >= 2) {
                        performSearch();
                    }
                });
            });
        }

        async function searchUsers(query) {
            const container = document.getElementById('searchResults');
            const queryLower = query.toLowerCase();
            
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const results = [];
                
                snapshot.forEach((childSnapshot) => {
                    const user = childSnapshot.val();
                    user.id = childSnapshot.key;
                    if (user.name && user.name.toLowerCase().includes(queryLower)) {
                        results.push(user);
                    }
                });
                
                if (results.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <h3>No users found</h3>
                            <p>Try a different search term</p>
                        </div>
                    `;
                    return;
                }
                
                const html = await Promise.all(results.map(async (user) => {
                    const isFollowing = await checkFollowing(user.id);
                    return `
                        <div class="user-result" onclick="window.navigateTo('profile', { userId: '${user.id}' })">
                            <img class="avatar" src="${getAvatarUrl(user.name, user.photoURL)}" alt="${escapeHtml(user.name)}">
                            <div class="info">
                                <div class="name">${escapeHtml(user.name)}</div>
                                <div class="email">${escapeHtml(user.email || '')}</div>
                            </div>
                            ${currentUser && user.id !== currentUser.uid ? `
                                <button class="follow-btn ${isFollowing ? 'following' : 'not-following'}" 
                                        onclick="event.stopPropagation(); window.toggleFollow('${user.id}')">
                                    ${isFollowing ? 'Following' : 'Follow'}
                                </button>
                            ` : ''}
                        </div>
                    `;
                }));
                
                container.innerHTML = html.join('');
            } catch (error) {
                console.error('Search Users Error:', error);
                container.innerHTML = '<p>Error searching users</p>';
            }
        }

        async function searchPosts(query) {
            const container = document.getElementById('searchResults');
            const queryLower = query.toLowerCase();
            
            try {
                const postsRef = ref(db, 'posts');
                const snapshot = await get(postsRef);
                const results = [];
                
                snapshot.forEach((childSnapshot) => {
                    const post = childSnapshot.val();
                    post.id = childSnapshot.key;
                    if (post.content && post.content.toLowerCase().includes(queryLower)) {
                        results.push(post);
                    }
                });
                
                results.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                if (results.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-file-alt"></i>
                            <h3>No posts found</h3>
                            <p>Try a different search term</p>
                        </div>
                    `;
                    return;
                }
                
                renderPosts(results, container);
            } catch (error) {
                console.error('Search Posts Error:', error);
                container.innerHTML = '<p>Error searching posts</p>';
            }
        }

        // ============================================
        // GLOBAL FUNCTIONS (for onclick handlers)
        // ============================================
        window.navigateTo = navigateTo;
        window.closeModal = closeModal;
        window.showToast = showToast;

        window.showFollowers = async function(userId) {
            try {
                const followersRef = ref(db, `followers/${userId}`);
                const snapshot = await get(followersRef);
                const users = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        users.push({ id: childSnapshot.key, ...childSnapshot.val() });
                    });
                }
                
                openModal(`
                    <div class="modal-header">
                        <h2>Followers</h2>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    ${users.length === 0 ? '<div class="empty-state"><p>No followers yet</p></div>' : 
                        users.map(user => `
                            <div class="user-result" onclick="closeModal(); navigateTo('profile', { userId: '${user.id}' })">
                                <img class="avatar" src="${getAvatarUrl(user.userName, user.userPhoto)}" alt="${escapeHtml(user.userName)}">
                                <div class="info">
                                    <div class="name">${escapeHtml(user.userName)}</div>
                                </div>
                            </div>
                        `).join('')
                    }
                `);
            } catch (error) {
                console.error('Show Followers Error:', error);
            }
        };

        window.showFollowing = async function(userId) {
            try {
                const followingRef = ref(db, `following/${userId}`);
                const snapshot = await get(followingRef);
                const users = [];
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        users.push({ id: childSnapshot.key, ...childSnapshot.val() });
                    });
                }
                
                const userPromises = users.map(async (u) => {
                    const userSnap = await get(ref(db, `users/${u.id}`));
                    if (userSnap.exists()) {
                        u.userName = userSnap.val().name || 'User';
                        u.userPhoto = userSnap.val().photoURL || '';
                    }
                    return u;
                });
                await Promise.all(userPromises);
                
                openModal(`
                    <div class="modal-header">
                        <h2>Following</h2>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    ${users.length === 0 ? '<div class="empty-state"><p>Not following anyone yet</p></div>' : 
                        users.map(user => `
                            <div class="user-result" onclick="closeModal(); navigateTo('profile', { userId: '${user.id}' })">
                                <img class="avatar" src="${getAvatarUrl(user.userName, user.userPhoto)}" alt="${escapeHtml(user.userName)}">
                                <div class="info">
                                    <div class="name">${escapeHtml(user.userName)}</div>
                                </div>
                            </div>
                        `).join('')
                    }
                `);
            } catch (error) {
                console.error('Show Following Error:', error);
            }
        };

        window.toggleFollow = async function(userId) {
            const isFollowing = await checkFollowing(userId);
            if (isFollowing) {
                await unfollowUser(userId);
            } else {
                await followUser(userId);
            }
            // Refresh search results if on search page
            const searchInput = document.getElementById('searchInput');
            if (searchInput && searchInput.value.trim()) {
                setupSearch();
                document.getElementById('searchBtn').click();
            }
        };

        // ============================================
        // THEME
        // ============================================
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const icon = document.querySelector('#themeToggle i');
            if (icon) {
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            }
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // ============================================
        // AUTH STATE
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            
            if (user) {
                currentUser = user;
                authContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
                
                const userRef = ref(db, `users/${user.uid}`);
                const userSnap = await get(userRef);
                if (userSnap.exists()) {
                    currentUserData = userSnap.val();
                }
                
                setupApp();
                navigateTo('home');
            } else {
                currentUser = null;
                currentUserData = null;
                authContainer.classList.remove('hidden');
                appContainer.classList.add('hidden');
            }
        });

        // ============================================
        // SETUP APP
        // ============================================
        function setupApp() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            updateThemeIcon();
            
            document.getElementById('logoutBtn').addEventListener('click', () => {
                if (confirm('Are you sure you want to logout?')) {
                    logoutUser();
                }
            });
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    navigateTo(item.dataset.page);
                });
            });
            
            document.getElementById('googleSignInBtn').addEventListener('click', signInWithGoogle);
        }

        // ============================================
        // ERROR HANDLING
        // ============================================
        window.addEventListener('error', (e) => {
            console.error('App Error:', e.error || e.message);
            showToast('An error occurred. Please try again.');
        });

        console.log('AGLS App Initialized');
        console.log('Version: 1.0.0');
        console.log('Built with ❤️ for Arabic learners');
    </script>
</body>
</html>
