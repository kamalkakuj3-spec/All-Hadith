<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AGLS - Arabic Grammar Life Support</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* ============================================
                   CSS VARIABLES
                   ============================================ */
        :root {
            --primary: #2d7d46;
            --primary-dark: #1e5a32;
            --primary-light: #3a9b5a;
            --secondary: #c8a86a;
            --bg-primary: #f5f3f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #888888;
            --border-color: #e0ddd8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s ease;
            --nav-height: 64px;
            --header-height: 56px;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #2a2a2a;
            --text-primary: #e8e6e3;
            --text-secondary: #b0b0b0;
            --text-muted: #777777;
            --border-color: #333333;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
        }

        /* ============================================
                   RESET & BASE
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* ============================================
                   LOADING SCREEN
                   ============================================ */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loadingScreen p {
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ============================================
                   AUTH / LOGIN PANEL
                   ============================================ */
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
            z-index: 1000;
        }

        .auth-container.hidden {
            display: none;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            color: white;
            font-weight: 700;
        }

        .auth-header h1 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .auth-header .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .auth-header .tagline {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 24px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .auth-btn:active {
            transform: scale(0.97);
        }

        .google-btn {
            background: #4285f4;
            color: white;
        }

        .google-btn:hover {
            background: #357abd;
        }

        .auth-footer {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-footer .highlight {
            color: var(--primary);
            font-weight: 600;
        }

        .auth-features {
            text-align: left;
            margin-bottom: 16px;
        }

        .auth-features p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .auth-features i {
            color: var(--primary);
            width: 20px;
        }

        /* ============================================
                   APP CONTAINER
                   ============================================ */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-secondary);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        .app-container.hidden {
            display: none;
        }

        /* ============================================
                   HEADER
                   ============================================ */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            padding: 8px 16px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--border-color);
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        /* ============================================
                   MAIN CONTENT
                   ============================================ */
        .main-content {
            padding-bottom: calc(var(--nav-height) + 16px);
            min-height: calc(100vh - var(--header-height));
        }

        /* ============================================
                   BOTTOM NAVIGATION
                   ============================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
            padding: 0 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.65rem;
            padding: 6px 0;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }

        .nav-item i {
            font-size: 1.3rem;
            transition: all var(--transition);
        }

        .nav-item span {
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active i {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 50%;
            transform: translateX(calc(50% + 12px));
            background: #e74c3c;
            color: white;
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            font-weight: 600;
        }

        .badge.hidden {
            display: none;
        }

        /* ============================================
                   PAGE STYLES
                   ============================================ */
        .page {
            display: none;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
                   POST STYLES
                   ============================================ */
        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            border: 1px solid var(--border-color);
        }

        .post-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--border-color);
            flex-shrink: 0;
            cursor: pointer;
        }

        .post-author {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
        }

        .post-author:hover {
            color: var(--primary);
        }

        .post-date {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .post-content {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 10px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .post-tag {
            background: var(--border-color);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .post-actions {
            display: flex;
            gap: 16px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .post-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
        }

        .post-action-btn:hover {
            background: var(--border-color);
        }

        .post-action-btn.liked {
            color: #e74c3c;
        }

        .post-action-btn .count {
            font-size: 0.75rem;
        }

        /* ============================================
                   CREATE POST
                   ============================================ */
        .create-post-area {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .create-post-area textarea {
            width: 100%;
            border: none;
            resize: vertical;
            min-height: 80px;
            padding: 8px 0;
            font-size: 0.95rem;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
        }

        .create-post-area textarea::placeholder {
            color: var(--text-muted);
        }

        .create-post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 8px;
        }

        .create-post-footer input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-width: 120px;
        }

        .create-post-footer input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ============================================
                   BUTTONS
                   ============================================ */
        .btn-primary {
            padding: 8px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            padding: 8px 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.85rem;
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        /* ============================================
                   COMMENTS
                   ============================================ */
        .comment-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .comment-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 2px 0;
        }

        .comment-date {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .comment-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .comment-actions button {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
        }

        .comment-actions button:hover {
            color: var(--primary);
        }

        .comment-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input-area input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .comment-input-area input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .comment-input-area button {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* ============================================
                   PROFILE
                   ============================================ */
        .profile-header {
            text-align: center;
            padding: 20px 0;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 12px;
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .profile-email {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .profile-bio {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 4px 0;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 12px 0 16px;
        }

        .profile-stat {
            text-align: center;
            cursor: pointer;
        }

        .profile-stat .number {
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
        }

        .profile-stat .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .profile-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .profile-edit-input {
            width: 100%;
            max-width: 300px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 4px auto;
            font-size: 0.9rem;
        }

        .profile-edit-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ============================================
                   SEARCH
                   ============================================ */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-bar button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
        }

        .search-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .search-tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.85rem;
        }

        .search-tab.active {
            background: var(--primary);
            color: white;
        }

        .search-tab:hover:not(.active) {
            background: var(--border-color);
        }

        /* ============================================
                   NOTIFICATIONS
                   ============================================ */
        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            border-left: 3px solid var(--primary);
            cursor: pointer;
            transition: all var(--transition);
        }

        .notification-item:hover {
            background: var(--border-color);
        }

        .notification-item .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .notification-item .content {
            flex: 1;
        }

        .notification-item .content .text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .notification-item .content .text strong {
            color: var(--text-primary);
        }

        .notification-item .content .time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .notification-item.unread {
            border-left-color: #e74c3c;
            background: var(--bg-primary);
        }

        /* ============================================
                   MODAL
                   ============================================ */
        .modal-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-container.hidden {
            display: none;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .modal-content {
            position: relative;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 1;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h2 {
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
        }

        /* ============================================
                   USER SEARCH RESULT
                   ============================================ */
        .user-result {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            border-bottom: 1px solid var(--border-color);
        }

        .user-result:hover {
            background: var(--border-color);
        }

        .user-result .avatar {
            width: 40px;

        /* ============================================

        /* ============================================

        @media (max-width: 480px) {

            .post-card {

            .profile-stats {

            .profile-avatar {

        @media (min-width: 481px) {
            .app-container {
                border-left: 1px solid var(--border-color);
                border-right: 1px solid var(--border-color);
            }
        }

        /* ============================================
                   UTILITIES
                   ============================================ */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }

        /* ============================================
                   SCROLLBAR
                   ============================================ */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

    <!-- ============================================
    TOAST
    ============================================ -->
    <div id="toast" class="toast hidden"></div>

    <!-- ============================================
    FIREBASE SDK
    ============================================ -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
            }
        }
    </script>

    <!-- ============================================
    MAIN APPLICATION
    ============================================ -->
    <script type="module">
        // ============================================
        // IMPORTS
        // ============================================
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            onAuthStateChanged,
            signOut 
        } from 'firebase/auth';
        import { 
            getDatabase, 
            ref, 
            push, 
            set, 
            get, 
            update, 
            remove, 
            onValue, 
            query, 
            orderByChild, 
            limitToLast 
        } from 'firebase/database';

        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDaSwj73DW4EpA2XIkL2cMTF_fBzDzPjg4",
            authDomain: "all-hadith-a68fa.firebaseapp.com",
            databaseURL: "https://all-hadith-a68fa-default-rtdb.firebaseio.com",
            projectId: "all-hadith-a68fa",
            storageBucket: "all-hadith-a68fa.firebasestorage.app",
            messagingSenderId: "124928027736",
            appId: "1:124928027736:web:7f0e8e0a771f244eca2e2d",
            measurementId: "G-RF51PW2PLD"
        };

        // ============================================
        // INIT FIREBASE
        // ============================================
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // ============================================
        // APP STATE
        // ============================================
        let currentUser = null;
        let currentUserData = null;
        let currentPage = 'home';
        let feedListeners = {};
        let notificationListeners = {};

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const loadingScreen = document.getElementById('loadingScreen');
        const authContainer = document.getElementById('authContainer');
        const appContainer = document.getElementById('appContainer');
        const mainContent = document.getElementById('mainContent');
        const modalContainer = document.getElementById('modalContainer');
        const modalContent = document.getElementById('modalContent');
        const toast = document.getElementById('toast');
        const notificationBadge = document.getElementById('notificationBadge');

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.remove('hidden');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.add('hidden');
            }, duration);
        }

        // ============================================
        // MODAL
        // ============================================
        function openModal(html) {
            modalContent.innerHTML = html;
            modalContainer.classList.remove('hidden');
        }

        function closeModal() {
            modalContainer.classList.add('hidden');
        }

        document.querySelector('.modal-overlay').addEventListener('click', closeModal);

        // ============================================
        // HELPERS
        // ============================================
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getAvatarUrl(name, photoURL) {
            return photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2d7d46&color=fff&size=100`;
        }

        // ============================================
        // AUTH
        // ============================================
        async function signInWithGoogle() {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await saveUserToDatabase(user);
                showToast('Welcome to AGLS!');
                return user;
            } catch (error) {
                console.error('Google Sign In Error:', error);
                showToast('Sign in failed. Please try again.');
                throw error;
            }
        }

        async function saveUserToDatabase(user) {
            const userRef = ref(db, `users/${user.uid}`);
            const snapshot = await get(userRef);
            
            if (!snapshot.exists()) {
                await set(userRef, {
                    uid: user.uid,
                    name: user.displayName || 'User',
                    email: user.email,
                    photoURL: user.photoURL || '',
                    bio: '',
                    joinDate: new Date().toISOString(),
                    followers: 0,
                    following: 0,
                    posts: 0
                });
            } else {
                const data = snapshot.val();
                await update(userRef, {
                    name: user.displayName || data.name,
                    photoURL: user.photoURL || data.photoURL,
                    lastLogin: new Date().toISOString()
                });
            }
        }

        async function logoutUser() {
            try {
                await signOut(auth);
                showToast('Logged out successfully');
            } catch (error) {
                console.error('Logout Error:', error);
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function navigateTo(page, params = null) {
            currentPage = page;
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            
            renderPage(page, params);
        }

        function renderPage(page, params) {
            switch(page) {
                case 'home':
                    renderHome();
                    break;
                case 'explore':
                    renderExplore();
                    break;
                case 'search':
                    renderSearch();
                    break;
                case 'notifications':
                    renderNotifications();
                    break;
                case 'profile':
                    renderProfile(params?.userId || currentUser?.uid);
                    break;
                default:
                    renderHome();
            }
        }

        // ============================================
        // HOME
        // ============================================
        function renderHome() {
            mainContent.innerHTML = `
                <div class="page active">
                    <div class="create-post-area" id="createPostArea">
                        <textarea id="postContent" placeholder="Share your Arabic grammar knowledge..." maxlength="5000"></textarea>
                        <div class="create-post-footer">
                            <input type="text" id="postTags" placeholder="Add tags (comma separated)">
                            <button id="submitPostBtn" class="btn-primary">Post</button>
                        </div>
                    </div>
                    <div id="postsContainer"></div>
                </div>
            `;
            
            loadFeed('postsContainer');
            
            document.getElementById('submitPostBtn').addEventListener('click', async () => {
                const content = document.getElementById('postContent').value.trim();
                const tags = document.getElementById('postTags').value.split(',').map(t => t.trim()).filter(t => t);
                if (content) {
                    await createPost(content, tags);
                    document.getElementById('postContent').value = '';
                    document.getElementById('postTags').value = '';
                    loadFeed('postsContainer');
                }
            });
        }

        // ============================================
        // EXPLORE
        // ============================================
        function renderExplore() {
            mainContent.innerHTML = `
                <div class="page active">
                    <h2 style="margin-bottom:12px;">Explore</h2>
                    <div id="exploreContainer"></div>
                </div>
            `;
            loadPopularPosts('exploreContainer');
        }

        // ============================================
        // SEARCH
        // ============================================
        function renderSearch() {
            mainContent.innerHTML = `
                <div class="page active">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search users or posts..." autocomplete="off">
                        <button id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="search-tabs">
                        <button class="search-tab active" data-search="users">Users</button>
                        <button class="search-tab" data-search="posts">Posts</button>
                    </div>
                    <div id="searchResults"></div>
                </div>
            `;
            
            setupSearch();
        }

        // ============================================
        // NOTIFICATIONS
        // ============================================
        function renderNotifications() {
            mainContent.innerHTML = `
                <div class="page active">
                    <h2 style="margin-bottom:12px;">Notifications</h2>
                    <div id="notificationsContainer"></div>
                </div>
            `;
            loadNotifications('notificationsContainer');
        }

        // ============================================
        // PROFILE
        // ============================================
        async function renderProfile(userId) {
            mainContent.innerHTML = `
                <div class="page active">
                    <div id="profileContainer"></div>
                </div>
            `;
            await loadProfile('profileContainer', userId);
        }

        // ============================================
        // POSTS
        // ============================================
        async function createPost(content, tags) {
            if (!currentUser) {
                showToast('Please login to post');
                return;
            }
            
            const postData = {
                authorId: currentUser.uid,
                authorName: currentUserData?.name || currentUser.displayName || 'User',
                authorPhoto: currentUserData?.photoURL || currentUser.photoURL || '',
                content: content.trim(),
                tags: tags || [],
                date: new Date().toISOString(),
                likes: 0,
                comments: 0
            };
            
            try {
                const postsRef = ref(db, 'posts');
                const newPostRef = push(postsRef);
                await set(newPostRef, postData);
                
                const userRef = ref(db, `users/${currentUser.uid}`);
                const userSnap = await get(userRef);
                if (userSnap.exists()) {
                    const currentPosts = userSnap.val().posts || 0;
                    await update(userRef, { posts: currentPosts + 1 });
                }
                
                showToast('Post published successfully!');
                return newPostRef.key;
            } catch (error) {
                console.error('Create Post Error:', error);
                showToast('Failed to create post');
            }
        }

        async function deletePost(postId) {
            if (!currentUser) return;
            
            try {
                const postRef = ref(db, `posts/${postId}`);
                const postSnap = await get(postRef);
                
                if (!postSnap.exists()) return;
                
                const postData = postSnap.val();
                
                if (postData.authorId !== currentUser.uid) {
                    showToast('You can only delete your own posts');
                    return;
                }
                
                await remove(postRef);
                
                const userRef = ref(db, `users/${currentUser.uid}`);
                const userSnap = await get(userRef);
                if (userSnap.exists()) {
                    const currentPosts = userSnap.val().posts || 0;
                    await update(userRef, { posts: Math.max(0, currentPosts - 1) });
                }
                
                await remove(ref(db, `comments/${postId}`));
                await remove(ref(db, `likes/${postId}`));
                
                showToast('Post deleted');
                return true;
            } catch (error) {
                console.error('Delete Post Error:', error);
                showToast('Failed to delete post');
            }
        }

        async function editPost(postId, newContent, newTags) {
            if (!currentUser) return;
            
            try {
                const postRef = ref(db, `posts/${postId}`);
                const postSnap = await get(postRef);
                
                if (!postSnap.exists()) return;
                
                const postData = postSnap.val();
                
                if (postData.authorId !== currentUser.uid) {
                    showToast('You can only edit your own posts');
                    return;
                }
                
                await update(postRef, {
                    content: newContent.trim(),
                    tags: newTags || [],
                    edited: true,
                    editedDate: new Date().toISOString()
                });
                
                showToast('Post updated');
                return true;
            } catch (error) {
                console.error('Edit Post Error:', error);
                showToast('Failed to edit post');
            }
        }

        function loadFeed(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (feedListeners.feed) {
                feedListeners.feed.off();
                delete feedListeners.feed;
            }
            
            const postsRef = ref(db, 'posts');
            const postsQuery = query(postsRef, orderByChild('date'), limitToLast(50));
            
            feedListeners.feed = postsQuery;
            
            onValue(postsQuery, (snapshot) => {
                const posts = [];
                snapshot.forEach((childSnapshot) => {
                    const post = childSnapshot.val();
                    post.id = childSnapshot.key;
                    posts.push(post);
                });
                
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPosts(posts, container);
            }, (error) => {
                console.error('Load Feed Error:', error);
                container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Error loading posts</h3><p>Please try again later</p></div>`;
            });
        }

        function loadPopularPosts(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (feedListeners.popular) {
                feedListeners.popular.off();
                delete feedListeners.popular;
            }
            
            const postsRef = ref(db, 'posts');
            const postsQuery = query(postsRef, orderByChild('likes'), limitToLast(20));
            
            feedListeners.popular = postsQuery;
            
            onValue(postsQuery, (snapshot) => {
                const posts = [];
                snapshot.forEach((childSnapshot) => {
                    const post = childSnapshot.val();
                    post.id = childSnapshot.key;
                    posts.push(post);
                });
                
                posts.sort((a, b) => b.likes - a.likes);
                renderPosts(posts, container);
            });
        }

        function renderPosts(posts, container) {
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <h3>No posts yet</h3>
                        <p>Be the first to share your knowledge!</p>
                    </div>
                `;
                return;
            }
            
            const html = posts.map(post => createPostHTML(post)).join('');
            container.innerHTML = html;
            
            // Add event listeners
            container.querySelectorAll('.post-card').forEach(card => {
                const postId = card.dataset.postId;
                
                const likeBtn = card.querySelector('.like-btn');
                if (likeBtn) {
                    likeBtn.addEventListener('click', () => handleLike(postId, likeBtn));
                    checkLikeStatus(postId, likeBtn);
                }
                
                const commentBtn = card.querySelector('.comment-btn');
                if (commentBtn) {
                    commentBtn.addEventListener('click', () => openCommentModal(postId));
                }
                
                const deleteBtn = card.querySelector('.delete-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async () => {
                        if (confirm('Delete this post?')) {
                            await deletePost(postId);
                            loadFeed('postsContainer');
                        }
                    });
                }
                
                const editBtn = card.querySelector('.edit-btn');
                if (editBtn) {
                    editBtn.addEventListener('click', () => {
                        const content = card.querySelector('.post-content').textContent;
                        const tags = posts.find(p => p.id === postId)?.tags || [];
                        openEditModal(postId, content, tags.join(', '));
                    });
                }
                
                const authorEl = card.querySelector('.post-author');
                if (authorEl) {
                    authorEl.addEventListener('click', () => {
                        const authorId = posts.find(p => p.id === postId)?.authorId;
                        if (authorId) navigateTo('profile', { userId: authorId });
                    });
                }
                
                const avatarEl = card.querySelector('.post-avatar');
                if (avatarEl) {
                    avatarEl.addEventListener('click', () => {
                        const authorId = posts.find(p => p.id === postId)?.authorId;
                        if (authorId) navigateTo('profile', { userId: authorId });
                    });
                }
            });
        }

        function createPostHTML(post) {
            const isOwner = currentUser && post.authorId === currentUser.uid;
            
            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <img class="post-avatar" src="${getAvatarUrl(post.authorName, post.authorPhoto)}" alt="${escapeHtml(post.authorName)}">
                        <div>
                            <div class="post-author">${escapeHtml(post.authorName)}</div>
                            <span class="post-date">${formatDate(post.date)}${post.edited ? ' (edited)' : ''}</span>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    ${post.tags && post.tags.length > 0 ? `
                        <div class="post-tags">
                            ${post.tags.map(tag => `<span class="post-tag">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="post-actions">
                        <button class="post-action-btn like-btn" data-post="${post.id}">
                            <i class="far fa-heart"></i>
                            <span class="count">${post.likes || 0}</span>
                        </button>
                        <button class="post-action-btn comment-btn" data-post="${post.id}">
                            <i class="far fa-comment"></i>
                            <span class="count">${post.comments || 0}</span>
                        </button>
                        ${isOwner ? `
                            <button class="post-action-btn edit-btn" data-post="${post.id}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="post-action-btn delete-btn" data-post="${post.id}">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // ============================================
        // LIKES
        // ============================================
        async function handleLike(postId, btnElement) {
            if (!currentUser) {
                showToast('Please login to like posts');
                return;
            }
            
            const isLiked = btnElement.classList.contains('liked');
            const countEl = btnElement.querySelector('.count');
            const currentCount = parseInt(countEl.textContent) || 0;
            
            try {
                const likeRef = ref(db, `likes/${postId}/${currentUser.uid}`);
                const postRef = ref(db, `posts/${postId}`);
                
                if (isLiked) {
                    await remove(likeRef);
                    await update(postRef, { likes: currentCount - 1 });
                    btnElement.classList.remove('liked');
                    btnElement.querySelector('i').className = 'far fa-heart';
                    countEl.textContent = currentCount - 1;
                } else {
                    await set(likeRef, {
                        userId: currentUser.uid,
                        userName: currentUserData?.name || currentUser.displayName || 'User',
                        date: new Date().toISOString()
                    });
                    await update(postRef, { likes: currentCount + 1 });
                    btnElement.classList.add('liked');
                    btnElement.querySelector('i').className = 'fas fa-heart';
                    countEl.textContent = currentCount + 1;
                    
                    const postSnap = await get(postRef);
                    if (postSnap.exists()) {
                        const postData = postSnap.val();
                        if (postData.authorId !== currentUser.uid) {
                            await sendNotification(postData.authorId, 'like', {
                                postId: postId,
                                fromUserId: currentUser.uid,
                                fromUserName: currentUserData?.name || currentUser.displayName || 'User',
                                fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL || ''
                            });
                        }
                    }
                }
            } catch (error) {
                console.error('Like Error:', error);
            }
        }

        async function checkLikeStatus(postId, btnElement) {
            if (!currentUser) return;
            
            try {
                const likeRef = ref(db, `likes/${postId}/${currentUser.uid}`);
                const snapshot = await get(likeRef);
                if (snapshot.exists()) {
                    btnElement.classList.add('liked');
                    btnElement.querySelector('i').className = 'fas fa-heart';
                }
            } catch (error) {
                // Ignore
            }
        }

        // ============================================
        // COMMENTS
        // ============================================
        async function addComment(postId, content) {
            if (!currentUser) {
                showToast('Please login to comment');
                return;
            }
            
            if (!content.trim()) return;
            
            try {
                const commentRef = ref(db, `comments/${postId}`);
                const newCommentRef = push(commentRef);
                
                await set(newCommentRef, {
                    authorId: currentUser.uid,
                    authorName: currentUserData?.name || currentUser.displayName || 'User',
                    authorPhoto: currentUserData?.photoURL || currentUser.photoURL || '',
                    content: content.trim(),
                    date: new Date().toISOString(),
                    likes: 0
                });
                
                const postRef = ref(db, `posts/${postId}`);
                const postSnap = await get(postRef);
                if (postSnap.exists()) {
                    const postData = postSnap.val();
                    await update(postRef, { comments: (postData.comments || 0) + 1 });
                    
                    if (postData.authorId !== currentUser.uid) {
                        await sendNotification(postData.authorId, 'comment', {
                            postId: postId,
                            fromUserId: currentUser.uid,
                            fromUserName: currentUserData?.name || currentUser.displayName || 'User',
                            fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL || '',
                            comment: content.trim().substring(0, 50)
                        });
                    }
                }
                
                showToast('Comment added');
                return true;
            } catch (error) {
                console.error('Add Comment Error:', error);
                showToast('Failed to add comment');
            }
        }

        async function deleteComment(postId, commentId) {
            if (!currentUser) return;
            
            try {
                const commentRef = ref(db, `comments/${postId}/${commentId}`);
                const commentSnap = await get(commentRef);
                
                if (!commentSnap.exists()) return;
                
                const commentData = commentSnap.val();
                
                if (commentData.authorId !== currentUser.uid) {
                    showToast('You can only delete your own comments');
                    return;
                }
                
                await remove(commentRef);
                
                const postRef = ref(db, `posts/${postId}`);
                const postSnap = await get(postRef);
                if (postSnap.exists()) {
                    const postData = postSnap.val();
                    await update(postRef, { comments: Math.max(0, (postData.comments || 0) - 1) });
                }
                
                return true;
            } catch (error) {
                console.error('Delete Comment Error:', error);
            }
        }

        function loadComments(postId, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (feedListeners[`comments_${postId}`]) {
                feedListeners[`comments_${postId}`].off();
                delete feedListeners[`comments_${postId}`];
            }
            
            const commentsRef = ref(db, `comments/${postId}`);
            
            feedListeners[`comments_${postId}`] = commentsRef;
            
            onValue(commentsRef, (snapshot) => {
                const comments = [];
                snapshot.forEach((childSnapshot) => {
                    const comment = childSnapshot.val();
                    comment.id = childSnapshot.key;
                    comments.push(comment);
                });
                
                comments.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderComments(comments, container, postId);
            }, (error) => {
                console.error('Load Comments Error:', error);
            });
        }

        function renderComments(comments, container, postId) {
            if (!comments || comments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:20px;">
                        <p style="font-size:0.9rem;">No comments yet. Be the first!</p>
                    </div>
                `;
                return;
            }
            
            const html = comments.map(comment => `
                <div class="comment-item" data-comment="${comment.id}">
                    <img class="comment-avatar" src="${getAvatarUrl(comment.authorName, comment.authorPhoto)}" alt="${escapeHtml(comment.authorName)}">
                    <div class="comment-body">
                        <span class="comment-author">${escapeHtml(comment.authorName)}</span>
                        <div class="comment-text">${escapeHtml(comment.content)}</div>
                        <div class="comment-actions">
                            <span class="comment-date">${formatDate(comment.date)}</span>
                            ${currentUser && comment.authorId === currentUser.uid ? `
                                <button class="delete-comment" data-post="${postId}" data-comment="${comment.id}">Delete</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
            
            container.querySelectorAll('.delete-comment').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('Delete this comment?')) {
                        const pId = btn.dataset.post;
                        const cId = btn.dataset.comment;
                        if (pId && cId) {
                            await deleteComment(pId, cId);
                            loadComments(pId, container.id);
                        }
                    }
                });
            });
        }

            openModal(`

                </div>

        // ============================================
        // NOTIFICATIONS
        // ============================================
        async function sendNotification(userId, type, data) {
            try {
                const notifRef = ref(db, `notifications/${userId}`);
                const newNotif = push(notifRef);
                await set(newNotif, {
                    type: type,
                    fromUserId: data.fromUserId,
                    fromUserName: data.fromUserName,
                    fromUserPhoto: data.fromUserPhoto || '',
                    postId: data.postId || '',
                    comment: data.comment || '',
                    date: new Date().toISOString(),
                    read: false
                });
            } catch (error) {
                console.error('Send Notification Error:', error);
            }
        }

        function loadNotifications(containerId) {
            const container = document.getElementById(containerId);
            if (!container || !currentUser) return;
            
            if (notificationListeners.notifications) {
                notificationListeners.notifications.off();
                delete notificationListeners.notifications;
            }
            
            const notifRef = ref(db, `notifications/${currentUser.uid}`);
            const notifQuery = query(notifRef, orderByChild('date'), limitToLast(50));
            
            notificationListeners.notifications = notifQuery;
            
            onValue(notifQuery, (snapshot) => {
                const notifications = [];
                let unreadCount = 0;
                
                snapshot.forEach((childSnapshot) => {
                    const notif = childSnapshot.val();
                    notif.id = childSnapshot.key;
                    notifications.push(notif);
                    if (!notif.read) unreadCount++;
                });
                
                notifications.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderNotificationsList(notifications, container);
                
                if (unreadCount > 0) {
                    notificationBadge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                    notificationBadge.classList.remove('hidden');
                } else {
                    notificationBadge.classList.add('hidden');
                }
            });
        }

        function renderNotificationsList(notifications, container) {
            if (!notifications || notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell"></i>
                        <h3>No notifications</h3>
                        <p>You're all caught up!</p>
                    </div>
                `;
                return;
            }
            
            const html = notifications.map(notif => `
                <div class="notification-item ${notif.read ? '' : 'unread'}" data-notif="${notif.id}">
                    <img class="avatar" src="${getAvatarUrl(notif.fromUserName, notif.fromUserPhoto)}" alt="${escapeHtml(notif.fromUserName)}">
                    <div class="content">
                        <div class="text">
                            <strong>${escapeHtml(notif.fromUserName)}</strong>
                            ${notif.type === 'follow' ? 'started following you' : ''}
                            ${notif.type === 'like' ? 'liked your post' : ''}
                            ${notif.type === 'comment' ? `commented: "${escapeHtml(notif.comment)}${notif.comment && notif.comment.length > 40 ? '...' : ''}"` : ''}
                        </div>
                        <div class="time">${formatDate(notif.date)}</div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
            
            container.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', async () => {
                    const notifId = item.dataset.notif;
                    if (notifId && item.classList.contains('unread')) {
                        try {
                            const notifRef = ref(db, `notifications/${currentUser.uid}/${notifId}`);
                            await update(notifRef, { read: true });
                            item.classList.remove('unread');
                        } catch (error) {
                            console.error('Mark read error:', error);
                        }
                    }
                    
                    const notif = notifications.find(n => n.id === notifId);
                    if (notif && notif.postId) {
                        closeModal();
                        showToast('Opening post...');
                    }
                });
            });
        }

        // ============================================
        // PROFILE
        // ============================================
        async function loadProfile(containerId, userId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const targetId = userId || currentUser?.uid;
            if (!targetId) {
                container.innerHTML = '<p>User not found</p>';
                return;
            }
            
            try {
                const userRef = ref(db, `users/${targetId}`);
                const userSnap = await get(userRef);
                
                if (!userSnap.exists()) {
                    container.innerHTML = '<p>User not found</p>';
                    return;
                }
                
                const userData = userSnap.val();
                const isOwnProfile = currentUser && targetId === currentUser.uid;
                const isFollowing = await checkFollowing(targetId);
                
                const followersSnap = await get(ref(db, `followers/${targetId}`));
                const followingSnap = await get(ref(db, `following/${targetId}`));
                const followersCount = followersSnap.exists() ? followersSnap.size : 0;
                const followingCount = followingSnap.exists() ? followingSnap.size : 0;
                
                container.innerHTML = `
                    <div class="profile-header">
                        <img class="profile-avatar" src="${getAvatarUrl(userData.name, userData.photoURL)}" alt="${escapeHtml(userData.name)}">
                        <div class="profile-name">${escapeHtml(userData.name)}</div>
                        <div class="profile-email">${escapeHtml(userData.email || '')}</div>
                        ${userData.bio ? `<div class="profile-bio">${escapeHtml(userData.bio)}</div>` : ''}
                        <div class="profile-stats">
                            <div class="profile-stat">
                                <span class="number">${userData.posts || 0}</span>
                                <span class="label">Posts</span>
                            </div>
                            <div class="profile-stat" onclick="window.showFollowers('${targetId}')">
                                <span class="number">${followersCount}</span>
                                <span class="label">Followers</span>
                            </div>
                            <div class="profile-stat" onclick="window.showFollowing('${targetId}')">
                                <span class="number">${followingCount}</span>
                                <span class="label">Following</span>
                            </div>
                        </div>
                        <div class="profile-actions">
                            ${isOwnProfile ? `
                                <button class="btn-secondary" id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button>
                            ` : `
                                <button class="btn-${isFollowing ? 'secondary' : 'primary'}" id="followBtn">
                                    ${isFollowing ? 'Unfollow' : 'Follow'}
                                </button>
                            `}
                        </div>
                    </div>
                    <div id="userPostsContainer"></div>
                `;
                
                loadUserPosts('userPostsContainer', targetId);
                
                if (isOwnProfile) {
                    document.getElementById('editProfileBtn').addEventListener('click', () => {
                        openEditProfileModal(userData);
                    });
                }
                
                if (!isOwnProfile) {
                    document.getElementById('followBtn').addEventListener('click', async () => {
                        if (isFollowing) {
                            await unfollowUser(targetId);
                        } else {
                            await followUser(targetId);
                        }
                        loadProfile(containerId, targetId);
                    });
                }
                
            } catch (error) {
                console.error('Load Profile Error:', error);
                container.innerHTML = '<p>Error loading profile</p>';
            }
        }

        function loadUserPosts(containerId, userId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (feedListeners[`userposts_${userId}`]) {
                feedListeners[`userposts_${userId}`].off();
                delete feedListeners[`userposts_${userId}`];
            }
            
            const postsRef = ref(db, 'posts');
            const postsQuery = query(postsRef, orderByChild('authorId'), limitToLast(100));
            
            feedListeners[`userposts_${userId}`] = postsQuery;
            
            onValue(postsQuery, (snapshot) => {
                const posts = [];
                snapshot.forEach((childSnapshot) => {
                    const post = childSnapshot.val();
                    if (post.authorId === userId) {
                        post.id = childSnapshot.key;
                        posts.push(post);
                    }
                });
                
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPosts(posts, container);
            });
        }
