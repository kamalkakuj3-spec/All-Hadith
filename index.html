<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AGLS - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary: #2d7d46;
            --primary-dark: #1e5a32;
            --bg-primary: #f5f3f0;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #888888;
            --border-color: #e0ddd8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s ease;
            --nav-height: 64px;
            --header-height: 56px;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #2a2a2a;
            --text-primary: #e8e6e3;
            --text-secondary: #b0b0b0;
            --text-muted: #777777;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            padding-bottom: 80px;
        }

        /* ===== হেডার ===== */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-secondary);
            padding: 8px 16px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .header-left h1 { font-size: 1.3rem; color: var(--primary); font-weight: 700; }
        .header-right { display: flex; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px;
            border: none; border-radius: 50%;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--border-color); }
        .icon-btn:active { transform: scale(0.92); }

        /* ===== মেইন কন্টেন্ট ===== */
        .main-content {
            max-width: 480px; margin: 0 auto;
            padding: 16px; padding-bottom: calc(var(--nav-height) + 20px);
        }

        /* ===== নিচের নেভিগেশন ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100; backdrop-filter: blur(10px);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
            background: none; border: none;
            color: var(--text-muted); font-size: 0.6rem;
            padding: 4px 0; cursor: pointer; transition: all var(--transition);
            position: relative;
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--primary); }
        .badge {
            position: absolute; top: 2px; right: 50%;
            transform: translateX(calc(50% + 12px));
            background: #e74c3c; color: white; font-size: 0.5rem;
            padding: 1px 6px; border-radius: 10px; min-width: 16px;
            text-align: center; font-weight: 600;
        }
        .badge.hidden { display: none; }

        /* ===== স্ট্যাট কার্ড ===== */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;
        }
        .stat-card {
            background: var(--bg-card); padding: 12px;
            border-radius: var(--radius-sm); text-align: center;
            border: 1px solid var(--border-color);
        }
        .stat-card .number { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .stat-card .label { font-size: 0.65rem; color: var(--text-muted); }

        /* ===== ক্রিয়েট পোস্ট ===== */
        .create-post-area {
            background: var(--bg-card); border-radius: var(--radius);
            padding: 14px; margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }
        .create-post-area textarea {
            width: 100%; border: none; resize: vertical;
            min-height: 70px; padding: 6px 0;
            font-size: 0.9rem; background: transparent;
            color: var(--text-primary); font-family: inherit; outline: none;
        }
        .create-post-footer {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 8px; padding-top: 8px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap; gap: 8px;
        }
        .create-post-footer input {
            flex: 1; padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8rem; background: var(--bg-primary);
            color: var(--text-primary); min-width: 100px;
        }
        .create-post-footer input:focus { outline: none; border-color: var(--primary); }

        /* ===== বাটন ===== */
        .btn-primary {
            padding: 8px 18px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm);
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
            white-space: nowrap; transition: all var(--transition);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary {
            padding: 6px 14px; background: transparent;
            color: var(--text-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
        }
        .btn-danger {
            padding: 6px 14px; background: #e74c3c; color: white;
            border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
        }

        /* ===== পোস্ট ===== */
        .post-card {
            background: var(--bg-card); border-radius: var(--radius);
            padding: 14px; margin-bottom: 12px;
            box-shadow: var(--shadow); border: 1px solid var(--border-color);
        }
        .post-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        }
        .post-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; cursor: pointer;
        }
        .post-author { font-weight: 600; font-size: 0.9rem; cursor: pointer; }
        .post-author:hover { color: var(--primary); }
        .post-date { color: var(--text-muted); font-size: 0.7rem; }
        .post-content {
            color: var(--text-secondary); font-size: 0.9rem;
            margin-bottom: 8px; word-wrap: break-word; white-space: pre-wrap;
        }
        .post-tags {
            display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;
        }
        .post-tag {
            background: var(--border-color); padding: 2px 10px;
            border-radius: 12px; font-size: 0.65rem; color: var(--text-secondary);
        }
        .post-actions {
            display: flex; gap: 12px; padding-top: 8px;
            border-top: 1px solid var(--border-color); flex-wrap: wrap;
        }
        .post-action-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.8rem; cursor: pointer; display: flex;
            align-items: center; gap: 4px; padding: 4px 8px;
            border-radius: var(--radius-sm); transition: all var(--transition);
        }
        .post-action-btn:hover { background: var(--border-color); }
        .post-action-btn.liked { color: #e74c3c; }

        /* ===== কমেন্ট ===== */
        .comment-item {
            display: flex; gap: 10px; padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .comment-item:last-child { border-bottom: none; }
        .comment-avatar {
            width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
        }
        .comment-body { flex: 1; }
        .comment-author { font-weight: 600; font-size: 0.8rem; }
        .comment-text { font-size: 0.85rem; color: var(--text-secondary); }
        .comment-date { font-size: 0.6rem; color: var(--text-muted); }
        .comment-input-area {
            display: flex; gap: 8px; margin-top: 8px;
        }
        .comment-input-area input {
            flex: 1; padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); font-size: 0.8rem;
            background: var(--bg-primary); color: var(--text-primary);
        }
        .comment-input-area button {
            padding: 6px 14px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm);
            cursor: pointer; font-weight: 600; font-size: 0.75rem;
        }

        /* ===== মডাল ===== */
        .modal-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
        .modal-container.hidden { display: none; }
        .modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        .modal-content {
            position: relative; background: var(--bg-secondary);
            border-radius: var(--radius); padding: 20px;
            max-width: 460px; width: 100%; max-height: 90vh;
            overflow-y: auto; z-index: 1; animation: modalSlideUp 0.3s ease;
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .modal-close {
            background: none; border: none; font-size: 1.5rem;
            color: var(--text-muted); cursor: pointer; padding: 0 6px;
        }

        /* ===== টোস্ট ===== */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); color: var(--text-primary);
            padding: 10px 20px; border-radius: var(--radius-sm);
            box-shadow: var(--shadow); border: 1px solid var(--border-color);
            z-index: 999; max-width: 90%; text-align: center;
            font-size: 0.85rem; animation: slideUp 0.3s ease;
        }
        .toast.hidden { display: none; }

        /* ===== খালি স্টেট ===== */
        .empty-state {
            text-align: center; padding: 30px 20px; color: var(--text-muted);
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.5; }
        .empty-state h3 { color: var(--text-secondary); font-size: 1rem; }

        /* ===== ইউটিলিটি ===== */
        .hidden { display: none !important; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <!-- ===== হেডার ===== -->
    <header class="app-header">
        <div class="header-left"><h1>AGLS</h1></div>
        <div class="header-right">
            <button id="adminBtn" class="icon-btn hidden" title="Admin Panel">
                <i class="fas fa-user-shield"></i>
            </button>
            <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <!-- ===== মেইন কন্টেন্ট ===== -->
    <main class="main-content" id="mainContent">
        <div class="page active">
            <!-- স্ট্যাটস -->
            <div class="stats-grid" id="dashboardStats">
                <div class="stat-card"><span class="number" id="dashPosts">0</span><span class="label">My Posts</span></div>
                <div class="stat-card"><span class="number" id="dashFollowers">0</span><span class="label">Followers</span></div>
                <div class="stat-card"><span class="number" id="dashFollowing">0</span><span class="label">Following</span></div>
            </div>

            <!-- ক্রিয়েট পোস্ট -->
            <div class="create-post-area">
                <textarea id="postContent" placeholder="Share your Arabic grammar knowledge..." maxlength="5000"></textarea>
                <div class="create-post-footer">
                    <input type="text" id="postTags" placeholder="Tags (comma separated)">
                    <button id="submitPostBtn" class="btn-primary">Post</button>
                </div>
            </div>

            <!-- ফিড -->
            <div id="postsContainer"></div>
        </div>
    </main>

    <!-- ===== নিচের নেভিগেশন ===== -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="index"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" data-page="explore"><i class="fas fa-compass"></i><span>Explore</span></button>
        <button class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Search</span></button>
        <button class="nav-item" data-page="notifications">
            <i class="fas fa-bell"></i><span>Alerts</span>
            <span id="notificationBadge" class="badge hidden">0</span>
        </button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </nav>

    <!-- ===== মডাল ===== -->
    <div id="modalContainer" class="modal-container hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- ===== টোস্ট ===== -->
    <div id="toast" class="toast hidden"></div>

    <!-- ===== Firebase ===== -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>

    <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getDatabase, ref, push, set, get, update, remove, onValue, query, orderByChild, limitToLast } from 'firebase/database';

    // ===== FIREBASE CONFIG =====
    const firebaseConfig = {
        apiKey: "AIzaSyDaSwj73DW4EpA2XIkL2cMTF_fBzDzPjg4",
        authDomain: "all-hadith-a68fa.firebaseapp.com",
        databaseURL: "https://all-hadith-a68fa-default-rtdb.firebaseio.com",
        projectId: "all-hadith-a68fa",
        storageBucket: "all-hadith-a68fa.firebasestorage.app",
        messagingSenderId: "124928027736",
        appId: "1:124928027736:web:7f0e8e0a771f244eca2e2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ===== STATE =====
    let currentUser = null;
    let currentUserData = null;
    let isAdmin = false;
    let feedListeners = {};
    let notificationListeners = {};

    // ===== DOM =====
    const mainContent = document.getElementById('mainContent');
    const modalContainer = document.getElementById('modalContainer');
    const modalContent = document.getElementById('modalContent');
    const toast = document.getElementById('toast');
    const notificationBadge = document.getElementById('notificationBadge');
    const adminBtn = document.getElementById('adminBtn');

    // ===== HELPERS =====
    function showToast(msg, duration = 3000) {
        toast.textContent = msg;
        toast.classList.remove('hidden');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.add('hidden'), duration);
    }

    function openModal(html) { modalContent.innerHTML = html; modalContainer.classList.remove('hidden'); }
    function closeModal() { modalContainer.classList.add('hidden'); }
    document.querySelector('.modal-overlay')?.addEventListener('click', closeModal);

    function formatDate(d) {
        const date = new Date(d);
        const now = new Date();
        const diff = now - date;
        if (diff < 60000) return 'Just now';
        if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
        if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
        if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
        return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function getAvatar(name, photo) { return photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2d7d46&color=fff&size=100`; }

    // ===== NAVIGATION =====
    function navigateTo(page) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
        if (page === 'profile') window.location.href = 'profile.html';
        else if (page === 'admin') window.location.href = 'admin.html';
        else if (page === 'index') window.location.href = 'index.html';
        else {
            // Explore, Search, Notifications - ইন-পেজ
            renderPage(page);
        }
    }

    function renderPage(page) {
        if (page === 'explore') renderExplore();
        else if (page === 'search') renderSearch();
        else if (page === 'notifications') renderNotifications();
        else renderDashboard();
    }

    // ===== DASHBOARD =====
    function renderDashboard() {
        // Already rendered
        loadDashboardStats();
        loadFeed('postsContainer');
    }

    async function loadDashboardStats() {
        if (!currentUser) return;
        try {
            const snap = await get(ref(db, `users/${currentUser.uid}`));
            if (snap.exists()) {
                const d = snap.val();
                document.getElementById('dashPosts').textContent = d.posts || 0;
                document.getElementById('dashFollowers').textContent = d.followers || 0;
                document.getElementById('dashFollowing').textContent = d.following || 0;
            }
        } catch(e) { console.error(e); }
    }

    // ===== EXPLORE =====
    function renderExplore() {
        mainContent.innerHTML = `
            <div class="page active"><h2 style="margin-bottom:12px;">Explore</h2><div id="exploreContainer"></div></div>
        `;
        loadPopularPosts('exploreContainer');
    }

    // ===== SEARCH =====
    function renderSearch() {
        mainContent.innerHTML = `
            <div class="page active">
                <div class="search-bar" style="display:flex;gap:8px;margin-bottom:12px;">
                    <input type="text" id="searchInput" placeholder="Search users or posts..." style="flex:1;padding:8px 14px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-primary);color:var(--text-primary);font-size:0.9rem;">
                    <button id="searchBtn" class="btn-primary"><i class="fas fa-search"></i></button>
                </div>
                <div class="search-tabs" style="display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--border-color);">
                    <button class="search-tab active" data-search="users" style="flex:1;padding:8px;background:var(--bg-secondary);border:none;color:var(--text-secondary);font-weight:500;cursor:pointer;font-size:0.8rem;transition:all 0.3s;">Users</button>
                    <button class="search-tab" data-search="posts" style="flex:1;padding:8px;background:var(--bg-secondary);border:none;color:var(--text-secondary);font-weight:500;cursor:pointer;font-size:0.8rem;transition:all 0.3s;">Posts</button>
                </div>
                <div id="searchResults"></div>
            </div>
        `;
        setupSearch();
    }

    // ===== NOTIFICATIONS =====
    function renderNotifications() {
        mainContent.innerHTML = `<div class="page active"><h2 style="margin-bottom:12px;">Notifications</h2><div id="notificationsContainer"></div></div>`;
        loadNotifications('notificationsContainer');
    }

    // ===== POSTS =====
    async function createPost(content, tags) {
        if (!currentUser) { showToast('Please login'); return; }
        const postData = {
            authorId: currentUser.uid,
            authorName: currentUserData?.name || currentUser.displayName || 'User',
            authorPhoto: currentUserData?.photoURL || currentUser.photoURL || '',
            content: content.trim(),
            tags: tags || [],
            date: new Date().toISOString(),
            likes: 0, comments: 0
        };
        try {
            const newRef = push(ref(db, 'posts'));
            await set(newRef, postData);
            const userSnap = await get(ref(db, `users/${currentUser.uid}`));
            if (userSnap.exists()) await update(ref(db, `users/${currentUser.uid}`), { posts: (userSnap.val().posts||0)+1 });
            showToast('Post published!');
        } catch(e) { console.error(e); showToast('Failed to create post'); }
    }

    async function deletePost(postId) {
        if (!currentUser) return;
        try {
            const postSnap = await get(ref(db, `posts/${postId}`));
            if (!postSnap.exists()) return;
            const postData = postSnap.val();
            if (postData.authorId !== currentUser.uid && !isAdmin) { showToast('Not your post'); return; }
            await remove(ref(db, `posts/${postId}`));
            if (postData.authorId === currentUser.uid) {
                const userSnap = await get(ref(db, `users/${currentUser.uid}`));
                if (userSnap.exists()) await update(ref(db, `users/${currentUser.uid}`), { posts: Math.max(0, (userSnap.val().posts||0)-1) });
            }
            await remove(ref(db, `comments/${postId}`));
            await remove(ref(db, `likes/${postId}`));
            showToast('Post deleted');
        } catch(e) { console.error(e); showToast('Failed to delete'); }
    }

    function loadFeed(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (feedListeners.feed) { feedListeners.feed.off(); delete feedListeners.feed; }
        const q = query(ref(db, 'posts'), orderByChild('date'), limitToLast(50));
        feedListeners.feed = q;
        onValue(q, (snap) => {
            const posts = [];
            snap.forEach(c => { const p = c.val(); p.id = c.key; posts.push(p); });
            posts.sort((a,b) => new Date(b.date) - new Date(a.date));
            renderPosts(posts, container);
        });
    }

    function loadPopularPosts(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (feedListeners.popular) { feedListeners.popular.off(); delete feedListeners.popular; }
        const q = query(ref(db, 'posts'), orderByChild('likes'), limitToLast(20));
        feedListeners.popular = q;
        onValue(q, (snap) => {
            const posts = [];
            snap.forEach(c => { const p = c.val(); p.id = c.key; posts.push(p); });
            posts.sort((a,b) => b.likes - a.likes);
            renderPosts(posts, container);
        });
    }

    function renderPosts(posts, container) {
        if (!posts || posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-file-alt"></i><h3>No posts yet</h3></div>`;
            return;
        }
        container.innerHTML = posts.map(p => createPostHTML(p)).join('');
        container.querySelectorAll('.post-card').forEach(card => {
            const pid = card.dataset.postId;
            const likeBtn = card.querySelector('.like-btn');
            if (likeBtn) { likeBtn.addEventListener('click', ()=>handleLike(pid, likeBtn)); checkLikeStatus(pid, likeBtn); }
            const commentBtn = card.querySelector('.comment-btn');
            if (commentBtn) commentBtn.addEventListener('click', ()=>openCommentModal(pid));
            const deleteBtn = card.querySelector('.delete-btn');
            if (deleteBtn) deleteBtn.addEventListener('click', async ()=>{ if(confirm('Delete?')) { await deletePost(pid); loadFeed('postsContainer'); loadDashboardStats(); } });
            const editBtn = card.querySelector('.edit-btn');
            if (editBtn) editBtn.addEventListener('click', ()=>{ const c = card.querySelector('.post-content').textContent; const t = posts.find(p=>p.id===pid)?.tags||[]; openEditModal(pid, c, t.join(', ')); });
            const author = card.querySelector('.post-author');
            if (author) author.addEventListener('click', ()=>{ const aid = posts.find(p=>p.id===pid)?.authorId; if(aid) window.location.href = `profile.html?uid=${aid}`; });
        });
    }

    function createPostHTML(post) {
        const isOwner = currentUser && post.authorId === currentUser.uid;
        const canDelete = isOwner || isAdmin;
        return `
            <div class="post-card" data-post-id="${post.id}">
                <div class="post-header">
                    <img class="post-avatar" src="${getAvatar(post.authorName, post.authorPhoto)}" alt="${escapeHtml(post.authorName)}">
                    <div><div class="post-author">${escapeHtml(post.authorName)}</div><span class="post-date">${formatDate(post.date)}${post.edited?' (edited)':''}</span></div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                ${post.tags?.length ? `<div class="post-tags">${post.tags.map(t=>`<span class="post-tag">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                <div class="post-actions">
                    <button class="post-action-btn like-btn"><i class="far fa-heart"></i> <span class="count">${post.likes||0}</span></button>
                    <button class="post-action-btn comment-btn"><i class="far fa-comment"></i> <span class="count">${post.comments||0}</span></button>
                    ${isOwner ? `<button class="post-action-btn edit-btn"><i class="fas fa-edit"></i></button>` : ''}
                    ${canDelete ? `<button class="post-action-btn delete-btn"><i class="fas fa-trash"></i></button>` : ''}
                </div>
            </div>
        `;
    }

    // ===== LIKES =====
    async function handleLike(postId, btn) {
        if (!currentUser) { showToast('Please login'); return; }
        const isLiked = btn.classList.contains('liked');
        const countEl = btn.querySelector('.count');
        const current = parseInt(countEl.textContent) || 0;
        try {
            const likeRef = ref(db, `likes/${postId}/${currentUser.uid}`);
            const postRef = ref(db, `posts/${postId}`);
            if (isLiked) {
                await remove(likeRef);
                await update(postRef, { likes: current - 1 });
                btn.classList.remove('liked');
                btn.querySelector('i').className = 'far fa-heart';
                countEl.textContent = current - 1;
            } else {
                await set(likeRef, { userId: currentUser.uid, userName: currentUserData?.name || currentUser.displayName, date: new Date().toISOString() });
                await update(postRef, { likes: current + 1 });
                btn.classList.add('liked');
                btn.querySelector('i').className = 'fas fa-heart';
                countEl.textContent = current + 1;
                const postSnap = await get(postRef);
                if (postSnap.exists() && postSnap.val().authorId !== currentUser.uid) {
                    await sendNotification(postSnap.val().authorId, 'like', { postId, fromUserId: currentUser.uid, fromUserName: currentUserData?.name || currentUser.displayName, fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL });
                }
            }
        } catch(e) { console.error(e); }
    }

    async function checkLikeStatus(postId, btn) {
        if (!currentUser) return;
        try {
            const snap = await get(ref(db, `likes/${postId}/${currentUser.uid}`));
            if (snap.exists()) { btn.classList.add('liked'); btn.querySelector('i').className = 'fas fa-heart'; }
        } catch(e) {}
    }

    // ===== COMMENTS =====
    async function addComment(postId, content) {
        if (!currentUser) { showToast('Please login'); return; }
        if (!content.trim()) return;
        try {
            const newRef = push(ref(db, `comments/${postId}`));
            await set(newRef, { authorId: currentUser.uid, authorName: currentUserData?.name || currentUser.displayName, authorPhoto: currentUserData?.photoURL || currentUser.photoURL, content: content.trim(), date: new Date().toISOString() });
            const postSnap = await get(ref(db, `posts/${postId}`));
            if (postSnap.exists()) {
                await update(ref(db, `posts/${postId}`), { comments: (postSnap.val().comments||0) + 1 });
                if (postSnap.val().authorId !== currentUser.uid) {
                    await sendNotification(postSnap.val().authorId, 'comment', { postId, fromUserId: currentUser.uid, fromUserName: currentUserData?.name || currentUser.displayName, fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL, comment: content.trim().substring(0,50) });
                }
            }
            showToast('Comment added');
        } catch(e) { console.error(e); showToast('Failed to add comment'); }
    }

    async function deleteComment(postId, commentId) {
        if (!currentUser) return;
        try {
            const snap = await get(ref(db, `comments/${postId}/${commentId}`));
            if (!snap.exists()) return;
            if (snap.val().authorId !== currentUser.uid && !isAdmin) { showToast('Not your comment'); return; }
            await remove(ref(db, `comments/${postId}/${commentId}`));
            const postSnap = await get(ref(db, `posts/${postId}`));
            if (postSnap.exists()) await update(ref(db, `posts/${postId}`), { comments: Math.max(0, (postSnap.val().comments||0)-1) });
        } catch(e) { console.error(e); }
    }

    function loadComments(postId, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (feedListeners[`comments_${postId}`]) { feedListeners[`comments_${postId}`].off(); delete feedListeners[`comments_${postId}`]; }
        const commentsRef = ref(db, `comments/${postId}`);
        feedListeners[`comments_${postId}`] = commentsRef;
        onValue(commentsRef, (snap) => {
            const comments = [];
            snap.forEach(c => { const cm = c.val(); cm.id = c.key; comments.push(cm); });
            comments.sort((a,b) => new Date(a.date) - new Date(b.date));
            renderComments(comments, container, postId);
        });
    }

    function renderComments(comments, container, postId) {
        if (!comments || comments.length === 0) {
            container.innerHTML = `<div class="empty-state" style="padding:12px;"><p style="font-size:0.85rem;">No comments yet</p></div>`;
            return;
        }
        container.innerHTML = comments.map(c => `
            <div class="comment-item" data-comment="${c.id}">
                <img class="comment-avatar" src="${getAvatar(c.authorName, c.authorPhoto)}">
                <div class="comment-body">
                    <span class="comment-author">${escapeHtml(c.authorName)}</span>
                    <div class="comment-text">${escapeHtml(c.content)}</div>
                    <div class="comment-actions">
                        <span class="comment-date">${formatDate(c.date)}</span>
                        ${(currentUser && (c.authorId === currentUser.uid || isAdmin)) ? `<button class="delete-comment" data-post="${postId}" data-comment="${c.id}" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.7rem;">Delete</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.delete-comment').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Delete this comment?')) {
                    await deleteComment(btn.dataset.post, btn.dataset.comment);
                    loadComments(btn.dataset.post, container.id);
                }
            });
        });
    }

    function openCommentModal(postId) {
        openModal(`
            <div class="modal-header"><h2>Comments</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <div id="commentList" data-post="${postId}"></div>
            <div class="comment-input-area">
                <input type="text" id="commentInput" placeholder="Write a comment...">
                <button id="submitComment">Post</button>
            </div>
        `);
        loadComments(postId, 'commentList');
        document.getElementById('submitComment').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            if (input.value.trim()) { await addComment(postId, input.value); input.value = ''; loadComments(postId, 'commentList'); }
        });
        document.getElementById('commentInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('submitComment').click(); });
    }

    function openEditModal(postId, content, tags) {
        openModal(`
            <div class="modal-header"><h2>Edit Post</h2><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <textarea id="editPostContent" style="width:100%;min-height:100px;padding:10px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;font-size:0.9rem;resize:vertical;">${escapeHtml(content)}</textarea>
            <input type="text" id="editPostTags" value="${escapeHtml(tags)}" style="width:100%;padding:6px 12px;margin-top:8px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-primary);color:var(--text-primary);">
            <button class="btn-primary" id="saveEditPost" style="margin-top:10px;width:100%;">Save Changes</button>
        `);
        document.getElementById('saveEditPost').addEventListener('click', async () => {
            const nc = document.getElementById('editPostContent').value.trim();
            const nt = document.getElementById('editPostTags').value.split(',').map(t=>t.trim()).filter(t=>t);
            if (nc) { await editPost(postId, nc, nt); closeModal(); loadFeed('postsContainer'); }
        });
    }

    async function editPost(postId, newContent, newTags) {
        if (!currentUser) return;
        try {
            const snap = await get(ref(db, `posts/${postId}`));
            if (!snap.exists()) return;
            if (snap.val().authorId !== currentUser.uid) { showToast('Not your post'); return; }
            await update(ref(db, `posts/${postId}`), { content: newContent.trim(), tags: newTags || [], edited: true, editedDate: new Date().toISOString() });
            showToast('Post updated');
        } catch(e) { console.error(e); showToast('Failed to edit'); }
    }

    // ===== NOTIFICATIONS =====
    async function sendNotification(userId, type, data) {
        try {
            const newRef = push(ref(db, `notifications/${userId}`));
            await set(newRef, { type, fromUserId: data.fromUserId, fromUserName: data.fromUserName, fromUserPhoto: data.fromUserPhoto || '', postId: data.postId || '', comment: data.comment || '', date: new Date().toISOString(), read: false });
        } catch(e) { console.error(e); }
    }

    function loadNotifications(containerId) {
        const container = document.getElementById(containerId);
        if (!container || !currentUser) return;
        if (notificationListeners.notifications) { notificationListeners.notifications.off(); delete notificationListeners.notifications; }
        const q = query(ref(db, `notifications/${currentUser.uid}`), orderByChild('date'), limitToLast(50));
        notificationListeners.notifications = q;
        onValue(q, (snap) => {
            const notifs = []; let unread = 0;
            snap.forEach(c => { const n = c.val(); n.id = c.key; notifs.push(n); if (!n.read) unread++; });
            notifs.sort((a,b) => new Date(b.date) - new Date(a.date));
            renderNotificationsList(notifs, container);
            if (unread > 0) { notificationBadge.textContent = unread > 9 ? '9+' : unread; notificationBadge.classList.remove('hidden'); }
            else { notificationBadge.classList.add('hidden'); }
        });
    }

    function renderNotificationsList(notifs, container) {
        if (!notifs || notifs.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-bell"></i><h3>No notifications</h3></div>`;
            return;
        }
        container.innerHTML = notifs.map(n => `
            <div class="notification-item ${n.read ? '' : 'unread'}" data-notif="${n.id}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--primary);cursor:pointer;">
                <img class="avatar" src="${getAvatar(n.fromUserName, n.fromUserPhoto)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
                <div class="content" style="flex:1;">
                    <div class="text" style="font-size:0.85rem;color:var(--text-secondary);"><strong>${escapeHtml(n.fromUserName)}</strong> ${n.type === 'follow' ? 'started following you' : n.type === 'like' ? 'liked your post' : n.type === 'comment' ? `commented: "${escapeHtml(n.comment)}${n.comment?.length > 40 ? '...' : ''}"` : ''}</div>
                    <div class="time" style="font-size:0.65rem;color:var(--text-muted);">${formatDate(n.date)}</div>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.notification-item').forEach(item => {
            item.addEventListener('click', async () => {
                const id = item.dataset.notif;
                if (id && item.classList.contains('unread')) {
                    try { await update(ref(db, `notifications/${currentUser.uid}/${id}`), { read: true }); item.classList.remove('unread'); } catch(e) {}
                }
            });
        });
    }

    // ===== SEARCH =====
    function setupSearch() {
        const input = document.getElementById('searchInput');
        const btn = document.getElementById('searchBtn');
        const tabs = document.querySelectorAll('.search-tab');
        let currentTab = 'users';
        const doSearch = () => {
            const q = input.value.trim();
            if (q.length >= 2) { currentTab === 'users' ? searchUsers(q) : searchPosts(q); }
            else { document.getElementById('searchResults').innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Type at least 2 characters</h3></div>`; }
        };
        btn.addEventListener('click', doSearch);
        input.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.search;
                if (input.value.trim().length >= 2) doSearch();
            });
        });
    }

    async function searchUsers(query) {
        const container = document.getElementById('searchResults');
        try {
            const snap = await get(ref(db, 'users'));
            const results = [];
            snap.forEach(c => { const u = c.val(); u.id = c.key; if (u.name?.toLowerCase().includes(query.toLowerCase())) results.push(u); });
            if (results.length === 0) { container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><h3>No users found</h3></div>`; return; }
            const html = await Promise.all(results.map(async u => {
                const isFollowing = await checkFollowing(u.id);
                return `<div class="user-result" onclick="window.location.href='profile.html?uid=${u.id}'" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border-color);cursor:pointer;">
                    <img class="avatar" src="${getAvatar(u.name, u.photoURL)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
                    <div class="info" style="flex:1;"><div class="name" style="font-weight:600;font-size:0.9rem;">${escapeHtml(u.name)}</div><div class="email" style="font-size:0.75rem;color:var(--text-muted);">${escapeHtml(u.email||'')}</div></div>
                    ${currentUser && u.id !== currentUser.uid ? `<button class="follow-btn ${isFollowing ? 'following' : 'not-following'}" onclick="event.stopPropagation(); window.toggleFollow('${u.id}')" style="padding:3px 12px;border-radius:12px;border:none;font-size:0.7rem;font-weight:600;cursor:pointer;background:${isFollowing ? 'var(--border-color)' : 'var(--primary)'};color:${isFollowing ? 'var(--text-secondary)' : 'white'};">${isFollowing ? 'Following' : 'Follow'}</button>` : ''}
                </div>`;
            }));
            container.innerHTML = html.join('');
        } catch(e) { console.error(e); container.innerHTML = '<p>Error searching users</p>'; }
    }

    async function searchPosts(query) {
        const container = document.getElementById('searchResults');
        try {
            const snap = await get(ref(db, 'posts'));
            const results = [];
            snap.forEach(c => { const p = c.val(); p.id = c.key; if (p.content?.toLowerCase().includes(query.toLowerCase())) results.push(p); });
            results.sort((a,b) => new Date(b.date) - new Date(a.date));
            if (results.length === 0) { container.innerHTML = `<div class="empty-state"><i class="fas fa-file-alt"></i><h3>No posts found</h3></div>`; return; }
            renderPosts(results, container);
        } catch(e) { console.error(e); container.innerHTML = '<p>Error searching posts</p>'; }
    }

    // ===== FOLLOW =====
    async function followUser(targetId) {
        if (!currentUser || targetId === currentUser.uid) return;
        try {
            await set(ref(db, `following/${currentUser.uid}/${targetId}`), { userId: targetId, date: new Date().toISOString() });
            await set(ref(db, `followers/${targetId}/${currentUser.uid}`), { userId: currentUser.uid, userName: currentUserData?.name || currentUser.displayName, userPhoto: currentUserData?.photoURL || currentUser.photoURL, date: new Date().toISOString() });
            await updateFollowCounts(currentUser.uid, 'following', 1);
            await updateFollowCounts(targetId, 'followers', 1);
            await sendNotification(targetId, 'follow', { fromUserId: currentUser.uid, fromUserName: currentUserData?.name || currentUser.displayName, fromUserPhoto: currentUserData?.photoURL || currentUser.photoURL });
            showToast('Following!'); loadDashboardStats();
        } catch(e) { console.error(e); showToast('Failed to follow'); }
    }

    async function unfollowUser(targetId) {
        if (!currentUser) return;
        try {
            await remove(ref(db, `following/${currentUser.uid}/${targetId}`));
            await remove(ref(db, `followers/${targetId}/${currentUser.uid}`));
            await updateFollowCounts(currentUser.uid, 'following', -1);
            await updateFollowCounts(targetId, 'followers', -1);
            showToast('Unfollowed'); loadDashboardStats();
        } catch(e) { console.error(e); showToast('Failed to unfollow'); }
    }

    async function updateFollowCounts(userId, field, change) {
        try {
            const snap = await get(ref(db, `users/${userId}`));
            if (snap.exists()) await update(ref(db, `users/${userId}`), { [field]: Math.max(0, (snap.val()[field]||0) + change) });
        } catch(e) { console.error(e); }
    }

    async function checkFollowing(targetId) {
        if (!currentUser) return false;
        try { const snap = await get(ref(db, `following/${currentUser.uid}/${targetId}`)); return snap.exists(); } catch(e) { return false; }
    }

    window.toggleFollow = async function(userId) {
        const isFollowing = await checkFollowing(userId);
        if (isFollowing) await unfollowUser(userId);
        else await followUser(userId);
        const input = document.getElementById('searchInput');
        if (input?.value.trim()) { setupSearch(); document.getElementById('searchBtn')?.click(); }
    };

    // ===== THEME =====
    function toggleTheme() {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        const icon = document.querySelector('#themeToggle i');
        if (icon) icon.className = dark ? 'fas fa-moon' : 'fas fa-sun';
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeIcon = document.querySelector('#themeToggle i');
    if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

    // ===== UPDATE ADMIN BUTTON =====
    function updateAdminButton() {
        if (isAdmin) adminBtn.classList.remove('hidden');
        else adminBtn.classList.add('hidden');
    }

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const snap = await get(ref(db, `users/${user.uid}`));
            if (snap.exists()) {
                currentUserData = snap.val();
                isAdmin = currentUserData.isAdmin || false;
                updateAdminButton();
            }
            setupApp();
            renderDashboard();
        } else {
            window.location.href = 'login.html';
        }
    });

    function setupApp() {
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Logout?')) { signOut(auth); }
        });
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => navigateTo(item.dataset.page));
        });
        document.getElementById('adminBtn').addEventListener('click', () => {
            if (isAdmin) window.location.href = 'admin.html';
            else showToast('Access denied');
        });

        // Submit post
        document.getElementById('submitPostBtn').addEventListener('click', async () => {
            const content = document.getElementById('postContent').value.trim();
            const tags = document.getElementById('postTags').value.split(',').map(t=>t.trim()).filter(t=>t);
            if (content) {
                await createPost(content, tags);
                document.getElementById('postContent').value = '';
                document.getElementById('postTags').value = '';
                loadFeed('postsContainer');
                loadDashboardStats();
            }
        });
    }

    console.log('🔥 AGLS Index Loaded');
    </script>
</body>
</html>
